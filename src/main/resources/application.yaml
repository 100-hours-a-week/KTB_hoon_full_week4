spring:
  application:
    name: fullstack

  profiles:
    active: prod
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: admin
    password: admin
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: true

jwt:
  secret: "my-secret-key-my-secret-key-my-secret-key-123456"
  access-token-expire-seconds: 3600